<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TABORA NEWS</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
  :root{
    --bg:#0a0f0d;
    --bg-elev:#121815;
    --card:#161f1b;
    --card-hi:#1c2723;
    --text:#f2f5f3;
    --muted:#8b9a94;
    --emerald:#14e8a4;
    --emerald-dim:#0d8f66;
    --gold:#ffc93c;
    --coral:#ff4d67;
    --ring: conic-gradient(from 180deg, var(--emerald), var(--gold), var(--coral), var(--emerald));
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;}
  body{padding-bottom:86px; overflow-x:hidden;}

  ::-webkit-scrollbar{display:none;}

  header{
    position:sticky; top:0; z-index:40;
    background:rgba(10,15,13,0.88);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.06);
    padding:14px 18px 12px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .logo{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700; font-size:21px; letter-spacing:-0.02em;
    display:flex; align-items:baseline; gap:6px;
  }
  .logo .t1{
    background:linear-gradient(90deg, var(--emerald), var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .logo .t2{ color:var(--text); font-weight:500; font-size:13px; letter-spacing:0.18em; opacity:0.6;}

  .live-pill{
    display:flex; align-items:center; gap:6px;
    background:rgba(255,77,103,0.12);
    border:1px solid rgba(255,77,103,0.3);
    color:var(--coral);
    font-size:11px; font-weight:700; letter-spacing:0.08em;
    padding:5px 10px; border-radius:100px;
  }
  .live-dot{
    width:6px; height:6px; border-radius:50%; background:var(--coral);
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,77,103,0.6); }
    50%{ box-shadow:0 0 0 5px rgba(255,77,103,0); }
  }

  .stories-wrap{ padding:16px 0 6px; }
  .stories-title{
    font-size:11px; font-weight:700; letter-spacing:0.14em; color:var(--muted);
    padding:0 18px 10px; text-transform:uppercase;
  }
  .stories{
    display:flex; gap:14px; overflow-x:auto; padding:0 18px 4px; scroll-snap-type:x proximity;
  }
  .story{
    flex:0 0 auto; width:62px; text-align:center; scroll-snap-align:start;
    animation:fadeUp 0.5s ease both;
  }
  .story-ring{
    width:62px; height:62px; border-radius:50%;
    background:var(--ring);
    padding:2.5px;
    display:flex; align-items:center; justify-content:center;
  }
  .story-inner{
    width:100%; height:100%; border-radius:50%; overflow:hidden;
    background:var(--card-hi); border:2px solid var(--bg);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; color:var(--emerald);
  }
  .story-inner img{ width:100%; height:100%; object-fit:cover; }
  .story-label{
    font-size:10px; color:var(--muted); margin-top:6px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:62px;
  }

  main{ max-width:520px; margin:0 auto; padding:8px 14px 0; }

  .empty-msg{
    text-align:center; color:var(--muted); padding:60px 20px; font-size:14px; line-height:1.6;
  }
  .empty-msg .big{ font-size:34px; display:block; margin-bottom:10px; }

  .post{
    background:var(--card);
    border-radius:18px;
    overflow:hidden;
    margin-bottom:18px;
    border:1px solid rgba(255,255,255,0.05);
    animation:fadeUp 0.55s cubic-bezier(.2,.8,.2,1) both;
  }
  .post-head{
    display:flex; align-items:center; gap:10px;
    padding:12px 14px 8px;
  }
  .post-avatar{
    width:30px; height:30px; border-radius:50%;
    background:linear-gradient(135deg, var(--emerald), var(--emerald-dim));
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:#04140e;
    font-family:'Space Grotesk',sans-serif;
  }
  .post-head .meta{ display:flex; flex-direction:column; }
  .post-head .place{ font-size:12.5px; font-weight:700; }
  .post-head .time{ font-size:11px; color:var(--muted); }

  .post-media{ position:relative; width:100%; aspect-ratio:4/3; background:#000; overflow:hidden;}
  .post-media img{ width:100%; height:100%; object-fit:cover; display:block; }

  .heart-burst{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:80px; pointer-events:none; filter:drop-shadow(0 4px 14px rgba(0,0,0,0.4));
  }
  .heart-burst.animate{ animation:burst 0.75s ease forwards; }
  @keyframes burst{
    0%{ transform:translate(-50%,-50%) scale(0); opacity:1; }
    30%{ transform:translate(-50%,-50%) scale(1.15); opacity:1; }
    45%{ transform:translate(-50%,-50%) scale(0.95); }
    80%{ opacity:1; }
    100%{ transform:translate(-50%,-50%) scale(1.3); opacity:0; }
  }

  .post-actions{
    display:flex; align-items:center; gap:14px;
    padding:10px 14px 2px;
  }
  .action-btn{
    background:none; border:none; display:flex; align-items:center; gap:6px;
    color:var(--text); font-size:13px; font-weight:600; padding:4px 2px;
  }
  .action-btn svg{ width:24px; height:24px; transition:transform 0.15s ease; }
  .action-btn.liked svg{ fill:var(--coral); stroke:var(--coral); }
  .action-btn:active svg{ transform:scale(0.8); }

  .post-body{ padding:6px 14px 16px; }
  .post-title{ font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700; line-height:1.3; margin:0 0 6px; }
  .post-desc{ font-size:14px; line-height:1.55; color:#cfd8d4; white-space:pre-wrap; }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  nav.bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    background:rgba(10,15,13,0.92);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-top:1px solid rgba(255,255,255,0.07);
    display:flex; align-items:center; justify-content:space-around;
    padding:10px 20px calc(10px + env(safe-area-inset-bottom));
  }
  .nav-btn{
    background:none; border:none; color:var(--muted); display:flex; flex-direction:column;
    align-items:center; gap:3px; font-size:10.5px; font-weight:600; padding:4px 10px;
  }
  .nav-btn.active{ color:var(--emerald); }
  .nav-btn svg{ width:23px; height:23px; }

  .nav-add{
    width:52px; height:52px; border-radius:50%;
    background:linear-gradient(135deg, var(--emerald), var(--gold));
    display:flex; align-items:center; justify-content:center;
    margin-top:-26px;
    box-shadow:0 6px 20px rgba(20,232,164,0.35);
    border:4px solid var(--bg);
  }
  .nav-add svg{ width:24px; height:24px; stroke:#04140e; }
  .nav-add:active{ transform:scale(0.92); }

  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(3px);
    z-index:60; opacity:0; pointer-events:none; transition:opacity 0.25s ease;
  }
  .sheet-backdrop.show{ opacity:1; pointer-events:auto; }

  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:61;
    background:var(--bg-elev);
    border-radius:22px 22px 0 0;
    padding:10px 20px calc(24px + env(safe-area-inset-bottom));
    max-width:520px; margin:0 auto;
    transform:translateY(100%); transition:transform 0.32s cubic-bezier(.2,.9,.25,1);
    max-height:88vh; overflow-y:auto;
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .sheet.show{ transform:translateY(0); }
  .sheet-handle{
    width:38px; height:4px; background:rgba(255,255,255,0.2); border-radius:10px;
    margin:8px auto 14px;
  }
  .sheet-title{ font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:700; margin:0 0 16px; }

  label{ display:block; font-size:12px; font-weight:700; letter-spacing:0.03em; color:var(--muted); margin:14px 0 6px; text-transform:uppercase;}

  input[type="text"], textarea{
    width:100%; padding:12px 14px; background:var(--card);
    border:1.5px solid rgba(255,255,255,0.08); border-radius:12px;
    color:var(--text); font-size:15px; font-family:'Inter',sans-serif;
  }
  input[type="text"]:focus, textarea:focus{ outline:none; border-color:var(--emerald); }
  textarea{ resize:vertical; min-height:90px; }

  .file-drop{
    border:1.5px dashed rgba(255,255,255,0.15); border-radius:12px;
    padding:16px; text-align:center; color:var(--muted); font-size:13px;
    position:relative; cursor:pointer;
  }
  .file-drop input{ position:absolute; inset:0; opacity:0; cursor:pointer; }

  #preview{ margin-top:12px; width:100%; border-radius:12px; display:none; max-height:220px; object-fit:cover; }

  button.submit-btn{
    width:100%; margin-top:20px; padding:15px;
    background:linear-gradient(90deg, var(--emerald), var(--gold));
    color:#04140e; border:none; border-radius:14px;
    font-weight:700; font-size:15px; font-family:'Space Grotesk',sans-serif;
  }
  button.submit-btn:disabled{ opacity:0.5; }
  button.submit-btn:active{ transform:scale(0.98); }

  #statusMsg{ text-align:center; font-size:13px; margin-top:12px; min-height:16px; font-weight:600; }

  .close-sheet{
    position:absolute; top:14px; right:16px; background:var(--card); border:none;
    width:30px; height:30px; border-radius:50%; color:var(--muted); font-size:16px;
  }

  .skeleton{
    background:var(--card); border-radius:18px; height:340px; margin-bottom:18px;
    position:relative; overflow:hidden;
  }
  .skeleton::after{
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{ from{transform:translateX(-100%);} to{transform:translateX(100%);} }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="t1">TABORA</span><span class="t2">NEWS</span></div>
  <div class="live-pill"><span class="live-dot"></span>LIVE</div>
</header>

<div class="stories-wrap">
  <div class="stories-title">Habari za Hivi Punde</div>
  <div class="stories" id="storiesRow"></div>
</div>

<main>
  <div id="postsContainer">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn active" id="navHome">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1Z"/></svg>
    Habari
  </button>
  <button class="nav-add" id="navAdd">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <button class="nav-btn" id="navAbout">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>
    Kuhusu
  </button>
</nav>

<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="postSheet">
  <button class="close-sheet" id="closeSheet">✕</button>
  <div class="sheet-handle"></div>
  <div class="sheet-title">Chapisha Tukio Jipya</div>

  <label>Kichwa cha habari</label>
  <input type="text" id="titleInput" placeholder="Mfano: Ajali barabara ya Kaliua">

  <label>Maelezo ya tukio</label>
  <textarea id="descInput" placeholder="Andika maelezo kamili ya tukio hapa..."></textarea>

  <label>Picha ya tukio</label>
  <div class="file-drop">
    📷 Gusa kuchagua au kupiga picha
    <input type="file" id="imageInput" accept="image/*" capture="environment">
  </div>
  <img id="preview" alt="Preview">

  <button class="submit-btn" id="submitBtn">Chapisha Sasa 🚀</button>
  <div id="statusMsg"></div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC4dbZ6cv1Vk-AH0yHBfrm8yUtg4GeWcVA",
    authDomain: "tabora-news.firebaseapp.com",
    projectId: "tabora-news",
    storageBucket: "tabora-news.firebasestorage.app",
    messagingSenderId: "288021206426",
    appId: "1:288021206426:web:1b6755df8cd1d3352b5623"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  const sheet = document.getElementById('postSheet');
  const backdrop = document.getElementById('sheetBackdrop');

  function openSheet(){
    sheet.classList.add('show');
    backdrop.classList.add('show');
  }
  function closeSheetFn(){
    sheet.classList.remove('show');
    backdrop.classList.remove('show');
  }
  document.getElementById('navAdd').onclick = openSheet;
  document.getElementById('closeSheet').onclick = closeSheetFn;
  backdrop.onclick = closeSheetFn;

  document.getElementById('navHome').onclick = () => {
    window.scrollTo({top:0, behavior:'smooth'});
  };
  document.getElementById('navAbout').onclick = () => {
    alert('Tabora News \n\nJukwaa la wananchi kuripoti na kufuatilia matukio ya Tabora kwa haraka, likiwa na picha halisi kutoka eneo la tukio.');
  };

  const imageInput = document.getElementById('imageInput');
  const preview = document.getElementById('preview');
  let selectedFile = null;

  imageInput.addEventListener('change', () => {
    const file = imageInput.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('submitBtn').onclick = async function(){
    const title = document.getElementById('titleInput').value.trim();
    const desc = document.getElementById('descInput').value.trim();
    const statusMsg = document.getElementById('statusMsg');
    const submitBtn = document.getElementById('submitBtn');

    if (!title || !desc) {
      statusMsg.style.color = '#ff4d67';
      statusMsg.textContent = 'Tafadhali jaza kichwa na maelezo.';
      return;
    }

    submitBtn.disabled = true;
    statusMsg.style.color = '#14e8a4';
    statusMsg.textContent = 'Inatuma...';

    try {
      let imageUrl = '';
      if (selectedFile) {
        statusMsg.textContent = 'Inapakia picha...';
        const fileRef = storage.ref('matukio/' + Date.now() + '_' + selectedFile.name);
        await fileRef.put(selectedFile);
        imageUrl = await fileRef.getDownloadURL();
      }

      statusMsg.textContent = 'Inahifadhi habari...';
      await db.collection('matukio').add({
        title, description: desc, imageUrl,
        likes: 0,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      statusMsg.style.color = '#14e8a4';
      statusMsg.textContent = 'Tukio limechapishwa!';

      document.getElementById('titleInput').value = '';
      document.getElementById('descInput').value = '';
      imageInput.value = '';
      preview.style.display = 'none';
      selectedFile = null;

      setTimeout(() => { closeSheetFn(); statusMsg.textContent=''; window.scrollTo({top:0,behavior:'smooth'}); }, 900);
    } catch (err) {
      console.error(err);
      statusMsg.style.color = '#ff4d67';
      statusMsg.textContent = 'Hitilafu: ' + err.message;
    } finally {
      submitBtn.disabled = false;
    }
  };

  const postsContainer = document.getElementById('postsContainer');
  const storiesRow = document.getElementById('storiesRow');

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  function timeAgo(date){
    if (!date) return 'Sasa hivi';
    const diff = Math.floor((Date.now() - date.getTime())/1000);
    if (diff < 60) return 'Sasa hivi';
    if (diff < 3600) return Math.floor(diff/60) + ' dakika zilizopita';
    if (diff < 86400) return Math.floor(diff/3600) + ' saa zilizopita';
    return Math.floor(diff/86400) + ' siku zilizopita';
  }

  db.collection('matukio').orderBy('timestamp','desc').onSnapshot(snapshot => {
    if (snapshot.empty) {
      postsContainer.innerHTML = '<div class="empty-msg"><span class="big">📭</span>Bado hakuna matukio.<br>Gusa + kuchapisha la kwanza.</div>';
      storiesRow.innerHTML = '';
      return;
    }

    let feedHtml = '';
    let storiesHtml = '';
    let i = 0;

    snapshot.forEach(doc => {
      const d = doc.data();
      const date = d.timestamp && d.timestamp.toDate ? d.timestamp.toDate() : null;
      const initials = (d.title || 'T').trim().charAt(0).toUpperCase();
      const delay = Math.min(i * 0.06, 0.4);

      feedHtml += `
        <article class="post" style="animation-delay:${delay}s">
          <div class="post-head">
            <div class="post-avatar">${initials}</div>
            <div class="meta">
              <div class="place">Tabora</div>
              <div class="time">${timeAgo(date)}</div>
            </div>
          </div>
          ${d.imageUrl ? `
          <div class="post-media" data-id="${doc.id}" data-likes="${d.likes||0}">
            <img src="${d.imageUrl}" alt="${escapeHtml(d.title)}">
            <div class="heart-burst">\u2764\ufe0f</div>
          </div>` : ''}
          <div class="post-actions">
            <button class="action-btn like-btn" data-id="${doc.id}" data-likes="${d.likes||0}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8Z"/></svg>
              <span class="like-count">${d.likes || 0}</span>
            </button>
          </div>
          <div class="post-body">
            <div class="post-title">${escapeHtml(d.title)}</div>
            <div class="post-desc">${escapeHtml(d.description)}</div>
          </div>
        </article>
      `;

      if (i < 10) {
        storiesHtml += `
          <div class="story">
            <div class="story-ring"><div class="story-inner">
              ${d.imageUrl ? `<img src="${d.imageUrl}">` : initials}
            </div></div>
            <div class="story-label">${escapeHtml((d.title||'').split(' ')[0])}</div>
          </div>
        `;
      }
      i++;
    });

    postsContainer.innerHTML = feedHtml;
    storiesRow.innerHTML = storiesHtml;

    document.querySelectorAll('.post-media').forEach(media => {
      let lastTap = 0;
      media.addEventListener('click', () => {
        const now = Date.now();
        if (now - lastTap < 350) {
          triggerLike(media.dataset.id, media);
        }
        lastTap = now;
      });
    });

    document.querySelectorAll('.like-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        triggerLike(btn.dataset.id, null, btn);
      });
    });
  });

  function triggerLike(postId, mediaEl, btnEl){
    const ref = db.collection('matukio').doc(postId);
    ref.update({ likes: firebase.firestore.FieldValue.increment(1) });

    if (mediaEl){
      const heart = mediaEl.querySelector('.heart-burst');
      heart.classList.remove('animate');
      void heart.offsetWidth;
      heart.classList.add('animate');
    }
    if (btnEl){
      btnEl.classList.add('liked');
      const countEl = btnEl.querySelector('.like-count');
      countEl.textContent = (parseInt(countEl.textContent)||0) + 1;
    } else {
      const relatedBtn = document.querySelector(`.like-btn[data-id="${postId}"]`);
      if (relatedBtn){
        relatedBtn.classList.add('liked');
        const countEl = relatedBtn.querySelector('.like-count');
        countEl.textContent = (parseInt(countEl.textContent)||0) + 1;
      }
    }
  }
</script>

</body>
</html>
